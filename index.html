<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>开元棋牌 - 全面进入加密世界</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    min-height:100vh;

    background:#111;

}



/* iframe区域 */

.game-frame{

    width:100%;

    height:100vh;

}


iframe{

    width:100%;

    height:100%;

    border:0;

}



/* CA弹层 */

.ca-mask{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.75);

    z-index:9999;

    padding:20px;

}





/* CA盒子 */

.ca-box{


    width:420px;


    max-width:100%;


    background:

    linear-gradient(
        145deg,
        #181818,
        #050505
    );


    border-radius:20px;


    border:2px solid #d5aa42;


    padding:30px;


    position:relative;


    color:white;


    box-shadow:

    0 0 40px rgba(255,200,80,.5);


}



/*关闭按钮*/

.close{


    position:absolute;

    right:15px;

    top:15px;


    width:38px;

    height:38px;


    border-radius:50%;


    border:none;


    background:#b00000;


    color:white;


    font-size:25px;


    cursor:pointer;


}





.title{


    text-align:center;


    color:#ffd45c;


    font-size:28px;


    font-weight:bold;


    margin-bottom:25px;


}




.ca{


    display:flex;


    gap:10px;


    align-items:center;


    background:#111;


    border-radius:10px;


    padding:12px;


    border:1px solid #80601f;


}




.address{


    flex:1;


    overflow:hidden;


    white-space:nowrap;


    text-overflow:ellipsis;


    color:#ddd;


}



.copy{


    width:42px;


    height:42px;


    border:0;


    border-radius:10px;


    background:#d7a83d;


    cursor:pointer;


}



/* Telegram按钮 */

.telegram{


    margin-top:20px;


    display:block;


    text-align:center;


    padding:14px;



    background:

    linear-gradient(
        135deg,
        #0088cc,
        #006699
    );



    border-radius:12px;



    color:white;



    text-decoration:none;



    font-weight:bold;



    font-size:16px;



    box-shadow:

    0 0 20px rgba(0,136,204,.5);


}



.telegram:hover{

    opacity:.85;

}

.ca-title{

    margin-top:18px;

    margin-bottom:8px;

    color:#ffd45c;

    font-size:15px;

    font-weight:bold;

}


@media(max-width:600px){


    .ca-box{

        padding:20px;

    }


}

</style>


</head>



<body>



<div class="game-frame">


<iframe id="game"></iframe>


</div>







<!-- CA弹层 -->
<div class="ca-mask" id="caMask">

    <div class="ca-box">

        <button class="close" onclick="closeCA()">×</button>

        <div class="title">
            官方 CA
        </div>

        <!-- 开元 -->
        <div class="ca-title">
            🟡 开元 CA
        </div>

        <div class="ca">
            <div class="address" id="ca1">
                0x05405738de97f992b2ec6078792092df9791ffff
            </div>

            <button class="copy" onclick="copyCA('ca1')">
                📋
            </button>
        </div>


        <a
            class="telegram"
            href="https://t.me/kaiyuan_bsc"
            target="_blank">
            ✈️ 加入 Telegram 社区
        </a>

    </div>

</div>







<script>


let frame=document.getElementById("game");



// 打开页面

window.onload=function(){

frame.src =
        "https://www.kaiyqprovodz30.cc/#/game?shareName=562dd1189&proxyAccount=&gameId=0";
    // 显示弹层

    document
    .getElementById("caMask")
    .style.display="flex";






};





// iframe完成

frame.onload=function(){


    console.log("游戏加载完成");


};






function closeCA(){


    document
    .getElementById("caMask")
    .style.display="none";


}





function copyCA(id){

    let text = document.getElementById(id).innerText;

    navigator.clipboard.writeText(text).then(function(){

        alert("CA 已复制");

    });

}



</script>



</body>

</html>
